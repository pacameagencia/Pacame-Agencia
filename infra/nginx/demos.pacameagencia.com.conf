server {
    server_name demos.pacameagencia.com;
    root /var/www/demos;
    index index.html;

    access_log /var/log/nginx/demos-access.log combined;
    error_log /var/log/nginx/demos-error.log warn;

    # Webhook Resend + contact-pacame + tracking pixel → proxy a webhook-server (puerto 3030)
    location ~ ^/(webhooks/|contact-pacame|t/|c/) {
        access_log /var/log/nginx/demos-track.log combined;
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_read_timeout 30s;
    }

    # Servir /<slug>/ y /<slug> redirige a /<slug>/
    location ~ ^/([a-z0-9-]+)$ {
        return 301 /$1/;
    }

    # Servir el HTML
    location / {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=300";
        add_header X-Pacame-Demo "1";
    }

    error_page 404 /404.html;
    location = /404.html {
        root /var/www/demos;
        internal;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/demos.pacameagencia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demos.pacameagencia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = demos.pacameagencia.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name demos.pacameagencia.com;
    return 404;
}
